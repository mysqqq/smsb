<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS BOMBER</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #070711;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --purple: #8b5cf6;
            --purple-light: #a78bfa;
            --text-primary: #f0f0ff;
            --text-secondary: #8890a4;
            --text-muted: #4a5068;
            --red: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 80% 80%, rgba(34, 211, 238, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 100px;
            padding: 5px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--red);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .header-badge span { 
            animation: pulse-dot 2s ease-in-out infinite; 
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(32px, 6vw, 52px);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, var(--purple-light) 40%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 32px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--red);
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .card-text {
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 32px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-contact {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 16px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.5);
        }

        .btn-contact:active {
            transform: translateY(0);
        }

        footer {
            text-align: center;
            padding: 32px 0 12px;
            font-size: 13px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
            margin-top: 40px;
        }

        footer span { 
            color: var(--purple-light); 
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }

            .card-title {
                font-size: 24px;
            }

            .card-text {
                font-size: 16px;
            }

            .btn-contact {
                padding: 14px 32px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="header-badge">
                <span>●</span> SYSTEM NOTICE
            </div>
            <h1>SMS BOMBER</h1>
        </div>

        <div class="card">
            <span class="icon">⚠️</span>
            <h2 class="card-title">Service Discontinued</h2>
            <p class="card-text">
                This tool has been discontinued due to unauthorized reselling by some users.<br>
                If you want access to the premium version, contact me directly.
            </p>
            <a href="https://www.facebook.com/mysterioussq" target="_blank" rel="noopener noreferrer" class="btn-contact">
                → Contact on Facebook
            </a>
        </div>

        <footer>
            © 2026 | Developed by: <span>Siegfried Samá</span>
        </footer>
    </div>
</body>
</html>
